name: Update Live Tech News

on:
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours
  workflow_dispatch: # Allows manual trigger

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python Architecture
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Execute Data Ingestion Script
        run: python update_news.py

      - name: Commit and Push Live Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add breaking-news.svg
          git commit -m "auto-update: injected real-time tech news" || exit 0
          git push
