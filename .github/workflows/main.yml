name: Generate Futuristic Contribution Snake

on:
  # The autonomous heartbeat
  schedule:
    - cron: "0 0 * * *" 
  
  # Manual override switch
  workflow_dispatch:
  
  # Event-driven trigger
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout Repository Environment
        uses: actions/checkout@v3

      - name: Generate Oxford Blue Snake Animation
        uses: Platane/snk@v3
        with:
          # Automatically fetches the repository owner's data
          github_user_name: ${{ github.repository_owner }}
          # Injects the Oxford Blue hexadecimal strictly into the generation
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#002147&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#002147

      - name: Deploy to Isolated Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
