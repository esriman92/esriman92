<svg xmlns="http://www.w3.org/2000/svg" width="920" height="480" viewBox="0 0 920 480">
    <rect width="920" height="480" rx="12" fill="#002147" />
    
    <rect width="920" height="35" rx="12" fill="#00152e" />
    <circle cx="20" cy="17.5" r="7" fill="#FF5F56" />
    <circle cx="45" cy="17.5" r="7" fill="#FFBD2E" />
    <circle cx="70" cy="17.5" r="7" fill="#27C93F" />
    
    <style>
        /* Existing Font Styles */
        .cmd { font-family: 'Fira Code', monospace; font-size: 18px; fill: #61DAFB; font-weight: bold; }
        .info { font-family: 'Fira Code', monospace; font-size: 17px; fill: #FFBD2E; font-weight: bold; }
        .text { font-family: 'Fira Code', monospace; font-size: 18px; fill: #E0ECEF; }

        /* NEW: The Cursor Animation Architecture */
        .cursor {
            fill: #61DAFB; /* Matches the command text color */
            /* We use step-end for a sharp, robotic on/off blink rather than a soft fade */
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
    </style>

    <text x="25" y="75" class="cmd">➜  ~ system.identity.fetch("Sriman_Emagouda")</text>
    
    <rect x="445" y="61" width="10" height="18" class="cursor" />

    <text x="25" y="115" class="info">[STATE: Active] | [ROLE: Software Developer] | [BASE: MSCS, UTA]</text>
    
    <text x="25" y="165" class="text">I am an engineer who bridges the gap between high-performance backend logic</text>
    <text x="25" y="195" class="text">and pristine user interfaces. Currently designing mobile applications with the</text>
    <text x="25" y="225" class="text">AIAA North Texas Section, I previously spent nearly two years engineering</text>
    <text x="25" y="255" class="text">enterprise software at Tata Consultancy Services, where I continuously led</text>
    <text x="25" y="285" class="text">development teams to deliver and scale complex architectures.</text>
    
    <text x="25" y="340" class="text">My approach to full-stack and AI development is holistic. A deep background</text>
    <text x="25" y="370" class="text">in professional photo editing and aesthetic design heavily influences my</text>
    <text x="25" y="400" class="text">front-end architecture. I treat UI/UX not as an afterthought, but as a</text>
    <text x="25" y="430" class="text">critical, high-fidelity layer of the system to ensure computational profundity.</text>
</svg>
